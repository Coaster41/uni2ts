# Model specs for the block2_stress forecast runner.
#
# Each entry under `models:` maps a model NAME (used as the output subdir under
# data/forecasts/<NAME>/) to an adapter spec. `adapter` selects the registered
# ForecastAdapter (see block2_stress/models/__init__.py); the remaining keys are
# forwarded to that adapter's constructor.
#
# Per-model env / shared npz: run each model in whatever venv has its deps and
# point all of them at the same --output-dir. Use --only NAME ... to select a
# subset. Adapters import their backend lazily, so an env missing one package
# can still run the others.
models:
  moiraie_16:
    adapter: moiraie
    ckpt: /srv/disk00/ctadler/uni2ts/outputs/pretrain/moiraie/gift_eval_pretrain_weighted/moiraie_training_7/HF_checkpoints/last
  moiraic_16:
    adapter: moiraic
    ckpt: /srv/disk00/ctadler/uni2ts/outputs/pretrain/moiraic/gift_eval_pretrain_weighted/moiraic_training_11/HF_checkpoints/last
  moiraie_patch_20:
    adapter: moiraie
    ckpt: /srv/disk00/ctadler/uni2ts/outputs/pretrain/moiraie/gift_eval_pretrain_weighted/moiraie_training_10/HF_checkpoints/last
  moiraic_patch_20:
    adapter: moiraic
    ckpt: /srv/disk00/ctadler/uni2ts/outputs/pretrain/moiraic/gift_eval_pretrain_weighted/moiraic_training_12/HF_checkpoints/last
  moiraie_causal_16:
    adapter: moiraie
    ckpt: /srv/disk00/ctadler/uni2ts/outputs/pretrain/moiraie_causal/gift_eval_pretrain_weighted/moiraie_training_0/HF_checkpoints/last
  moiraix_dec_cpm_16:
    adapter: moiraix
    ckpt: /srv/disk00/ctadler/uni2ts/outputs/pretrain/moiraix/gift_eval_pretrain_weighted/moiraix_dec_cpm_0/HF_checkpoints/last
  moiraie_enc_cpm_16:
    adapter: moiraix
    ckpt: /srv/disk00/ctadler/uni2ts/outputs/pretrain/moiraix/gift_eval_pretrain_weighted/moiraix_enc_cpm_0/HF_checkpoints/last
